name: cattle_breed_app
description: AI Powered Cattle Breed Recognition App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2

  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  provider: ^6.1.2

  supabase_flutter: ^2.3.4
  shared_preferences: ^2.2.2
  image_picker: ^1.0.7
  path_provider: ^2.1.2

  tflite_flutter: ^0.11.0
  image: ^4.1.7

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true

  assets:
    - assets/model/model.tflite
    - assets/model/labels.txt